<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IS 270 Website</title>
  <style>

    /* BODY AND GENERAL STYLING */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Courier New', Courier, monospace;
      background-color: #556B2F; /* Olive background */
      color: #333; /* default text inside creme bubbles */
    }

    /* NAV BAR */
    nav {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 20px;
      background-color: #4a5f27; /* Darker olive */
      position: sticky;
      top: 0;
      z-index: 10;
    }

    nav a {
      color: #FFF8DC; /* Creme links */
      text-decoration: none;
      font-size: 1.1rem;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* SECTION BUBBLES */
    section {
      background-color: #FFF8DC; /* Creme bubble */
      margin: 2rem auto;
      padding: 2rem;
      border-radius: 20px;
      max-width: 900px;
      color: #333;
    }

    h1 {
      margin-top: 2rem;
      font-size: 3rem;
      text-align: center;
    }

    .hello {
      font-size: 2rem;
      margin: 1rem 0;
    }

    .names {
      margin: 1rem 0;
      font-size: 1.2rem;
    }

    p {
      margin-bottom: 1.5rem;
    }

    /* Sticky cat wrapper */
    .cat-wrapper {
      height: 100vh;
      position: relative;
    }

    .cat-mosaic {
      position: sticky;
      top: 50px;
      width: 400px;
      height: 400px;
      margin: 0 auto;
      perspective: 1000px;
    }

    .cat-square {
      position: absolute;
      width: 20px;
      height: 20px;
      background-image: url('images/cat.png'); /* Cat image */
      background-size: 400px 400px;
      transition: all 0.5s ease;
    }

  </style>
</head>

<body>

  <!-- NAVIGATION BAR -->
  <nav>
    <a href="index.html">Home</a>
    <a href="dossier.html">Specialization Dossier</a>
  </nav>

  <main>

    <!-- INTRO SECTION -->
    <section>
      <h1>IS 270 Website</h1>
      <div class="hello">hello world</div>
      <div class="names">
        Jack Morrissey, Sophie Mearns, Ivan Mairesse, and Sam Warford
      </div>
      <p>Welcome to our IS 270 class website! Explore our specialization dossiers and learn more about our projects and contributions.</p>
    </section>

    <!-- CAT MOSAIC SECTION -->
    <section>
      <div class="cat-wrapper">
        <div class="cat-mosaic"></div>
      </div>
      <div style="height: 400px;"></div>
    </section>

  </main>

  <script>
    const mosaic = document.querySelector('.cat-mosaic');

    const rows = 20;
    const cols = 20;
    const containerWidth = 400;
    const containerHeight = 400;
    const squareSize = containerWidth / cols;

    let squares = [];

    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {

        const square = document.createElement('div');
        square.classList.add('cat-square');

        square.style.backgroundPosition = `-${x * squareSize}px -${y * squareSize}px`;

        const randomX = Math.random() * containerWidth * 1.5 - containerWidth/2;
        const randomY = Math.random() * containerHeight * 1.5;

        square.style.left = `${randomX}px`;
        square.style.top = `${randomY}px`;

        mosaic.appendChild(square);

        squares.push({
          el: square,
          targetX: x * squareSize,
          targetY: y * squareSize,
          startX: randomX,
          startY: randomY
        });

      }
    }

    const wrapper = document.querySelector('.cat-wrapper');

    window.addEventListener('scroll', () => {

      const rect = wrapper.getBoundingClientRect();
      const start = window.innerHeight;
      const end = 0;

      let progress = 1 - (rect.top - end) / (start - end);
      progress = Math.min(Math.max(progress, 0), 1);

      squares.forEach(sq => {
        sq.el.style.left = `${sq.startX + (sq.targetX - sq.startX) * progress}px`;
        sq.el.style.top = `${sq.startY + (sq.targetY - sq.startY) * progress}px`;
      });

    });
  </script>

</body>
</html>
