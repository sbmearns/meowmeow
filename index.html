<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IS 270 Website</title>
  <style>

    /* BODY AND GENERAL STYLING */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Courier New', Courier, monospace; /* Match dossier font */
      background-color: #556B2F; /* Olive background */
      color: #333; /* text inside sections */
    }

    /* NAV BAR */
    nav {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 20px;
      background-color: #4a5f27; /* Darker olive */
      position: sticky;
      top: 0;
      z-index: 10;
    }

    nav a {
      color: #FFF8DC; /* Creme links */
      text-decoration: none;
      font-size: 1.1rem;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* SECTION BUBBLES */
    section {
      background-color: #FFF8DC; /* Creme bubble */
      margin: 2rem auto;
      padding: 2rem;
      border-radius: 20px;
      max-width: 900px;
      color: #333;
    }

    h1 {
      margin-top: 2rem;
      font-size: 3rem;
      text-align: center;
    }

    .hello {
      font-size: 2rem;
      margin: 1rem 0;
    }

    .names {
      margin: 1rem 0;
      font-size: 1.2rem;
    }

    p {
      margin-bottom: 1.5rem;
    }

    /* CAT IMAGE */
    .cat-image {
      width: 100%;
      max-height: 50vh; /* Take bottom half of screen */
      object-fit: cover;
      display: block;
      margin: 0 auto;
    }

  </style>
</head>

<body>

  <!-- NAVIGATION BAR -->
  <nav>
    <a href="index.html">Home</a>
    <a href="dossier.html">Specialization Dossier</a>
  </nav>

  <main>

    <!-- INTRO SECTION -->
    <section>
      <h1>IS 270 Website</h1>
      <div class="hello">hello world</div>
      <div class="names">
        Jack Morrissey, Sophie Mearns, Ivan Mairesse, and Sam Warford
      </div>
      <p>Welcome to our IS 270 class website! Explore our specialization dossiers and learn more about our projects and contributions.</p>
    </section>

    <!-- CAT IMAGE SECTION -->
    <img src="images/cat.png" alt="Cat" class="cat-image">

  </main>

</body>
</html>
